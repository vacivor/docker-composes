services:
  portainer:
    image: portainer/portainer-ce:2.39.0-alpine
    container_name: portainer
    ports:
      - "9001:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    environment:
      - TZ=Asia/Shanghai
    restart: always

volumes:
  portainer-data:
    name: portainer-data