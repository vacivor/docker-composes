services:
  valkey:
    image: valkey/valkey:9.0-alpine
    container_name: valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-h", "127.0.0.1", "ping"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  valkey-data:
    name: valkey-data
