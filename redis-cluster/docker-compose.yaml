      redis-node-6:
        condition: service_healthy
    environment:
      REDIS_CLUSTER_ANNOUNCE_IP: ${REDIS_CLUSTER_ANNOUNCE_IP:-127.0.0.1}
      TZ: Asia/Shanghai
    volumes:
      - ./init-cluster.sh:/init-cluster.sh:ro
    entrypoint: ["/bin/sh", "/init-cluster.sh"]
    restart: "no"

