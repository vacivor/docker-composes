services:
  rabbitmq:
    build:
      context: .
      dockerfile: rabbitmq.Dockerfile
    container_name: rabbitmq
    restart: always

    ports:
      - "5672:5672"
      - "15672:15672"
      - "1883:1883"
      - "15675:15675"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data:
    name: rabbitmq_data